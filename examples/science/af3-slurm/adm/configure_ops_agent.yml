- name: Install and Configure Google Cloud Ops Agent
  hosts: localhost
  become: true

  tasks:
  - name: Repair RPM database and clean yum
    ansible.builtin.shell: |
      rm -f /var/lib/rpm/__db*
      rpm --rebuilddb
      yum clean all
    args:
      warn: false

  - name: Download Ops Agent repo script
    ansible.builtin.get_url:
      url: https://dl.google.com/cloudagents/add-google-cloud-ops-agent-repo.sh
      dest: /tmp/add-google-cloud-ops-agent-repo.sh
      mode: '0755'

  - name: Add Ops Agent repository and install
    ansible.builtin.command: bash /tmp/add-google-cloud-ops-agent-repo.sh --also-install

  - name: Remove legacy agents
    ansible.builtin.yum:
      name:
      - stackdriver-agent
      - google-fluentd
      - google-cloud-logging-agent
      state: absent

  - name: Configure Ops Agent for Slurm
    ansible.builtin.copy:
      dest: /etc/google-cloud-ops-agent/config.yaml
      content: |
        logging:
          receivers:
            slurm_slurmd:
              type: files
              include_paths:
              - /var/log/slurm/slurmd-*.log
            slurm_setup:
              type: files
              include_paths:
                - /var/log/slurm/setup.log
            slurm_sync:
              type: files
              include_paths:
              - /var/log/slurm/slurmsync.log
          service:
            pipelines:
              slurm_pipeline:
                receivers:
                - slurm_slurmd
                - slurm_setup
                - slurm_sync

  - name: Restart Ops Agent to apply config
    ansible.builtin.service:
      name: google-cloud-ops-agent
      state: restarted
      enabled: yes
